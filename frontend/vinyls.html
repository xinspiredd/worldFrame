<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>worldFrame — винилы</title>
    <style>
        /* Стили полностью идентичны index.html (можно скопировать оттуда) – для краткости не дублирую, но в вашем файле они должны быть. */
        /* Вставьте сюда полный блок <style> из index.html, чтобы сохранить единый вид. */
        /* Я рекомендую скопировать стили из index.html и вставить их сюда. */
        /* Ниже приведены только уникальные стили для винилов, но общие стили обязательны. */
    </style>
</head>
<body>
    <!-- Модальное окно входа/регистрации (точно такое же, как в index.html) -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="authTitle">Вход</h2>
            <input type="text" id="authLogin" placeholder="Логин">
            <input type="password" id="authPassword" placeholder="Пароль">
            <div id="adminKeyField" style="display: none;">
                <input type="text" id="authAdminKey" placeholder="Админ ключ (если есть)">
            </div>
            <div class="modal-actions">
                <button class="btn-primary" onclick="App.submitAuth()">Войти</button>
                <button class="btn-secondary" onclick="App.closeAuthModal()">Отмена</button>
            </div>
            <p style="text-align:center; margin-top:15px;">
                <a href="#" onclick="App.toggleAuthMode()" id="authToggle" style="color:#8cc9ff;">Регистрация</a>
            </p>
        </div>
    </div>

    <!-- Модальное окно добавления винила (как в предыдущих версиях) -->
    <div id="vinylModal" class="modal">
        <div class="modal-content" style="max-width:600px;">
            <h2>➕ Новый винил</h2>
            <div class="form-group" style="margin-bottom:15px;">
                <label style="display:block; margin-bottom:5px; color:#ccc;">Название винила</label>
                <input type="text" id="vinylName" placeholder="Например: Winter Drift">
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label style="display:block; margin-bottom:5px; color:#ccc;">Машина</label>
                <div class="search-select" id="carSearchContainer">
                    <input type="text" id="carSearchInput" placeholder="Начните вводить модель..." autocomplete="off">
                    <div class="dropdown" id="carDropdown"></div>
                </div>
                <input type="hidden" id="selectedCar">
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label style="display:block; margin-bottom:5px; color:#ccc;">Код винила</label>
                <textarea id="vinylCode" rows="4" placeholder="Вставьте код винила..."></textarea>
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label style="display:block; margin-bottom:5px; color:#ccc;">Обложка</label>
                <input type="file" id="vinylImage" accept="image/*">
                <img id="imagePreview" class="image-preview" style="display: none; max-width:200px; margin-top:10px; border-radius:8px; border:1px solid #2a6f8a;">
            </div>
            <div class="modal-actions">
                <button class="btn-primary" onclick="saveVinyl()">Сохранить</button>
                <button class="btn-secondary" onclick="closeVinylModal()">Отмена</button>
            </div>
        </div>
    </div>

    <div class="wrapper">
        <!-- Шапка -->
        <div class="top-bar">
            <div class="logo">worldFRAME</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Билды</a>
                <a href="vinyls.html" class="nav-link active">Винилы</a>
            </div>
            <div class="user-bar" id="userBar">
                <a onclick="App.openAuthModal('login')">Войти</a> | <a onclick="App.openAuthModal('register')">Регистрация</a>
            </div>
        </div>

        <!-- Заголовок и кнопка добавления -->
        <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: #1a1a1a; padding: 20px 30px; border-radius: 60px; border: 1px solid #333;">
            <h1 style="font-size:2rem; font-weight:600; color:#8cc9ff;">Галерея винилов</h1>
            <button class="add-btn" onclick="openVinylModal()" style="background:#2a6f8a; color:#fff; border:none; padding:12px 30px; border-radius:40px; font-size:1.1rem; font-weight:600; cursor:pointer; border:1px solid #4ab0ff;">+ Добавить винил</button>
        </div>

        <!-- Поиск и сортировка -->
        <div class="search-sort" style="display: flex; gap: 15px; margin-bottom: 25px; background: #1a1a1a; padding: 15px 25px; border-radius: 60px; border: 1px solid #333; align-items: center;">
            <input type="text" id="searchVinyls" placeholder="🔍 Поиск по названию или машине..." style="flex:1; background:#2a2a2a; border:1px solid #444; color:#fff; padding:12px 20px; border-radius:40px; font-size:1rem;">
            <select id="sortVinyls" style="background:#2a2a2a; border:1px solid #444; color:#fff; padding:12px 20px; border-radius:40px; font-size:1rem; cursor:pointer;">
                <option value="date">По дате (новые)</option>
                <option value="likes">По популярности (лайки)</option>
            </select>
        </div>

        <!-- Сетка винилов -->
        <div class="vinyls-grid" id="vinylsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-bottom: 40px;"></div>

        <footer style="text-align: center; color: #666; margin-top: 60px; font-size: 0.9rem;">
            <p>© worldFrame 2025 · Билды и винилы для NFS World</p>
        </footer>
    </div>

    <!-- Задаём адрес бэкенда -->
    <script>
        window.__API_URL = 'https://worldframe-backend.onrender.com/api';
        console.log('🌐 API URL задан:', window.__API_URL);
    </script>

    <!-- Подключаем скрипты -->
    <script src="cars.js"></script>
    <script src="api.js"></script>
    <script src="admin.js"></script>

    <!-- Скрипт для винилов -->
    <script>
        // ---------- ДАННЫЕ ----------
        const carsData = window.carsData;
        let allCarNames = [];
        for (const cars of Object.values(carsData)) {
            allCarNames.push(...cars);
        }
        allCarNames.sort();

        // ---------- ФУНКЦИИ ДЛЯ ВИНИЛОВ ----------
        let vinyls = [];

        async function loadVinyls() {
            try {
                vinyls = await window.api.getVinyls();
                renderVinyls();
            } catch (error) {
                console.error('Ошибка загрузки винилов:', error);
            }
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }

        const searchInput = document.getElementById('searchVinyls');
        const sortSelect = document.getElementById('sortVinyls');
        const grid = document.getElementById('vinylsGrid');

        function renderVinyls() {
            let filtered = vinyls.filter(v => {
                const search = searchInput.value.toLowerCase();
                return v.name.toLowerCase().includes(search) || v.car.toLowerCase().includes(search);
            });

            const sortBy = sortSelect.value;
            if (sortBy === 'likes') {
                filtered.sort((a, b) => (b.likes.length - b.dislikes.length) - (a.likes.length - a.dislikes.length));
            } else {
                filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }

            if (filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px; background:#1a1a1a; border-radius:20px;">Ничего не найдено</div>';
                return;
            }

            grid.innerHTML = filtered.map(v => {
                const user = App.getCurrentUser();
                const userLiked = user && v.likes.includes(user.id);
                const userDisliked = user && v.dislikes.includes(user.id);
                return `
                    <div class="vinyl-card" style="background:#1a1a1a; border-radius:16px; overflow:hidden; border:1px solid #333; display:flex; flex-direction:column;" data-id="${v._id}">
                        <img class="vinyl-image" style="width:100%; height:180px; object-fit:cover; background:#2a2a2a; border-bottom:1px solid #2a6f8a;" src="${v.image || 'data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%232a2a2a%22/><text x=%2250%22 y=%2255%22 font-size=%2230%22 text-anchor=%22middle%22 fill=%22%23666%22>🎨</text></svg>'}" alt="vinyl">
                        <div class="vinyl-info" style="padding:20px;">
                            <div class="vinyl-title" style="font-size:1.4rem; font-weight:600; color:#fff; margin-bottom:8px;">${escapeHtml(v.name)}</div>
                            <div class="vinyl-car" style="color:#8cc9ff; font-size:1rem; margin-bottom:12px;">🚗 ${escapeHtml(v.car)}</div>
                            <div class="vinyl-code" style="background:#2a2a2a; padding:12px; border-radius:8px; font-family:monospace; font-size:0.9rem; color:#aaa; border:1px solid #444; margin:15px 0; word-break:break-all; max-height:100px; overflow-y:auto; position:relative;">
                                ${escapeHtml(v.code).replace(/\n/g, '<br>')}
                                <button class="copy-btn" style="position:absolute; top:5px; right:5px; background:#2a6f8a; color:#fff; border:none; border-radius:20px; padding:4px 12px; font-size:0.7rem; cursor:pointer;" onclick="copyCode('${escapeHtml(v.code).replace(/'/g, "\\'")}')">Копировать</button>
                            </div>
                            <div class="vinyl-stats" style="display:flex; gap:15px; margin:10px 0; color:#aaa; align-items:center;">
                                <span class="likes" style="display:flex; align-items:center; gap:5px; cursor:pointer; color:#4caf50; ${userLiked ? 'font-weight:bold;' : ''}" onclick="likeVinyl('${v._id}')">👍 ${v.likes.length}</span>
                                <span class="dislikes" style="display:flex; align-items:center; gap:5px; cursor:pointer; color:#ff4d4d; ${userDisliked ? 'font-weight:bold;' : ''}" onclick="dislikeVinyl('${v._id}')">👎 ${v.dislikes.length}</span>
                                ${App.isAdmin() ? `<span class="delete-btn" style="margin-left:auto; color:#ff4d4d; cursor:pointer;" onclick="deleteVinyl('${v._id}')">🗑️</span>` : ''}
                            </div>
                            <div class="vinyl-date" style="color:#888; font-size:0.8rem; margin-bottom:5px;">📅 ${formatDate(v.createdAt)}</div>
                            <div class="comments-section" style="margin-top:15px; border-top:1px solid #333; padding-top:15px;">
                                ${v.comments.map((c, index) => `
                                    <div class="comment" style="background:#2a2a2a; border-radius:12px; padding:10px; margin-bottom:10px; position:relative;">
                                        <div class="comment-author" style="color:#8cc9ff; font-weight:600; margin-bottom:5px;">${escapeHtml(c.author)}</div>
                                        <div class="comment-text" style="color:#ccc; font-size:0.9rem;">${escapeHtml(c.text)}</div>
                                        ${App.isAdmin() ? `<span class="delete-comment" style="position:absolute; top:5px; right:5px; color:#ff4d4d; cursor:pointer;" onclick="deleteVinylComment('${v._id}', '${c._id}')">🗑️</span>` : ''}
                                    </div>
                                `).join('')}
                                <div class="add-comment" style="display:flex; gap:10px; margin-top:10px;">
                                    <input type="text" id="comment-${v._id}" placeholder="Ваш комментарий..." style="flex:1; background:#2a2a2a; border:1px solid #444; border-radius:40px; padding:10px 15px; color:#fff;">
                                    <button onclick="addVinylComment('${v._id}')" style="background:#2a6f8a; border:none; border-radius:40px; padding:10px 20px; color:#fff; cursor:pointer;">Отправить</button>
                                </div>
                            </div>
                            <div class="vinyl-author" style="color:#666; font-size:0.85rem; text-align:right; margin-top:10px;">by ${escapeHtml(v.author)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.likeVinyl = async (id) => {
            try {
                const result = await window.api.likeVinyl(id, 'like');
                const vinyl = vinyls.find(v => v._id === id);
                if (vinyl) {
                    vinyl.likes = result.likes;
                    vinyl.dislikes = result.dislikes;
                }
                renderVinyls();
            } catch (error) {
                alert(error.message);
            }
        };

        window.dislikeVinyl = async (id) => {
            try {
                const result = await window.api.likeVinyl(id, 'dislike');
                const vinyl = vinyls.find(v => v._id === id);
                if (vinyl) {
                    vinyl.likes = result.likes;
                    vinyl.dislikes = result.dislikes;
                }
                renderVinyls();
            } catch (error) {
                alert(error.message);
            }
        };

        window.addVinylComment = async (id) => {
            const input = document.getElementById(`comment-${id}`);
            const text = input.value.trim();
            if (!text) return;
            try {
                const newComment = await window.api.addVinylComment(id, text);
                const vinyl = vinyls.find(v => v._id === id);
                if (vinyl) {
                    vinyl.comments.push(newComment);
                }
                renderVinyls();
                input.value = '';
            } catch (error) {
                alert(error.message);
            }
        };

        window.copyCode = (code) => {
            navigator.clipboard.writeText(code).then(() => alert('Код скопирован!'));
        };

        window.deleteVinyl = async (id) => {
            if (!confirm('Удалить винил?')) return;
            try {
                await window.api.deleteVinyl(id);
                vinyls = vinyls.filter(v => v._id !== id);
                renderVinyls();
            } catch (error) {
                alert(error.message);
            }
        };

        window.deleteVinylComment = async (vinylId, commentId) => {
            if (!confirm('Удалить комментарий?')) return;
            try {
                await window.api.deleteVinylComment(vinylId, commentId);
                const vinyl = vinyls.find(v => v._id === vinylId);
                if (vinyl) {
                    vinyl.comments = vinyl.comments.filter(c => c._id !== commentId);
                }
                renderVinyls();
            } catch (error) {
                alert(error.message);
            }
        };

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe.replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        searchInput.addEventListener('input', renderVinyls);
        sortSelect.addEventListener('change', renderVinyls);

        // ---------- МОДАЛКА ДОБАВЛЕНИЯ ВИНИЛА ----------
        const vinylModal = document.getElementById('vinylModal');
        const vinylName = document.getElementById('vinylName');
        const vinylCode = document.getElementById('vinylCode');
        const vinylImage = document.getElementById('vinylImage');
        const imagePreview = document.getElementById('imagePreview');
        const carSearchInput = document.getElementById('carSearchInput');
        const carDropdown = document.getElementById('carDropdown');
        const selectedCar = document.getElementById('selectedCar');

        function openVinylModal() {
            vinylModal.classList.add('active');
            vinylName.value = '';
            vinylCode.value = '';
            carSearchInput.value = '';
            selectedCar.value = '';
            imagePreview.style.display = 'none';
            imagePreview.src = '';
            vinylImage.value = '';
        }
        function closeVinylModal() {
            vinylModal.classList.remove('active');
        }
        window.openVinylModal = openVinylModal;
        window.closeVinylModal = closeVinylModal;

        carSearchInput.addEventListener('input', () => {
            const query = carSearchInput.value.toLowerCase();
            const filtered = allCarNames.filter(name => name.toLowerCase().includes(query));
            carDropdown.innerHTML = filtered.map(name => `<div onclick="selectCar('${name.replace(/'/g, "\\'")}')" style="padding:10px; cursor:pointer;">${escapeHtml(name)}</div>`).join('');
            carDropdown.classList.add('show');
        });
        document.addEventListener('click', (e) => {
            if (!carSearchInput.contains(e.target) && !carDropdown.contains(e.target)) {
                carDropdown.classList.remove('show');
            }
        });
        window.selectCar = function(car) {
            carSearchInput.value = car;
            selectedCar.value = car;
            carDropdown.classList.remove('show');
        };

        vinylImage.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                imagePreview.style.display = 'none';
            }
        });

        window.saveVinyl = async function() {
            const name = vinylName.value.trim();
            const car = selectedCar.value;
            const code = vinylCode.value.trim();
            const image = imagePreview.src || '';

            if (!name || !car || !code) {
                alert('Заполните название, машину и код винила!');
                return;
            }

            try {
                const newVinyl = await window.api.createVinyl(name, car, code, image);
                vinyls.unshift(newVinyl);
                renderVinyls();
                closeVinylModal();
            } catch (error) {
                alert(error.message);
            }
        };

        // Инициализация
        loadVinyls();
    </script>
</body>
</html>
