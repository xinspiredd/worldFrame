<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>worldFrame — билды</title>
    <style>
        /* Вставьте сюда полный блок <style> из index.html, чтобы сохранить единый вид. */
        /* Ниже приведены дополнительные стили для страницы билдов. */
        .car-header { background:#1a1a1a; border-radius:16px; padding:30px; margin-bottom:30px; border:1px solid #2a6f8a; }
        .car-header h1 { font-size:2.5rem; color:#fff; margin-bottom:10px; }
        .car-header .car-class { color:#8cc9ff; font-size:1.5rem; border-left:5px solid #2a6f8a; padding-left:15px; }
        .builds-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:20px; }
        .build-card { background:#1a1a1a; border-radius:16px; padding:20px; border:1px solid #333; border-top:4px solid #2a6f8a; transition:0.2s; }
        .build-card:hover { border-color:#2a6f8a; box-shadow:0 10px 20px rgba(0,0,0,0.5); }
        .build-title { font-size:1.5rem; font-weight:600; color:#8cc9ff; margin-bottom:8px; }
        .build-author { color:#888; font-size:0.9rem; margin-bottom:15px; }
        .build-details { color:#ccc; white-space:pre-line; max-height:200px; overflow-y:auto; padding:10px; background:#2a2a2a; border-radius:8px; border:1px solid #444; font-size:0.95rem; }
        .build-stats { display:flex; gap:15px; margin:10px 0; color:#aaa; align-items:center; }
        .build-stats span { display:flex; align-items:center; gap:5px; cursor:pointer; }
        .likes { color:#4caf50; }
        .dislikes { color:#ff4d4d; }
        .delete-btn, .delete-comment { margin-left:auto; color:#ff4d4d; cursor:pointer; }
        .build-date { color:#888; font-size:0.8rem; margin-bottom:10px; }
        .comments-section { margin-top:15px; border-top:1px solid #333; padding-top:15px; }
        .comment { background:#2a2a2a; border-radius:12px; padding:10px; margin-bottom:10px; position:relative; }
        .comment-author { color:#8cc9ff; font-weight:600; margin-bottom:5px; }
        .comment-text { color:#ccc; font-size:0.9rem; }
        .delete-comment { position:absolute; top:5px; right:5px; }
        .add-comment { display:flex; gap:10px; margin-top:10px; }
        .add-comment input { flex:1; background:#2a2a2a; border:1px solid #444; border-radius:40px; padding:10px 15px; color:#fff; }
        .add-comment button { background:#2a6f8a; border:none; border-radius:40px; padding:10px 20px; color:#fff; cursor:pointer; }
        .no-builds { text-align:center; color:#666; font-size:1.5rem; padding:50px; background:#1a1a1a; border-radius:16px; border:2px dashed #333; grid-column:1/-1; }
    </style>
</head>
<body>
    <!-- Модальное окно входа/регистрации (как в index.html) -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="authTitle">Вход</h2>
            <input type="text" id="authLogin" placeholder="Логин">
            <input type="password" id="authPassword" placeholder="Пароль">
            <div id="adminKeyField" style="display: none;">
                <input type="text" id="authAdminKey" placeholder="Админ ключ (если есть)">
            </div>
            <div class="modal-actions">
                <button class="btn-primary" onclick="App.submitAuth()">Войти</button>
                <button class="btn-secondary" onclick="App.closeAuthModal()">Отмена</button>
            </div>
            <p style="text-align:center; margin-top:15px;">
                <a href="#" onclick="App.toggleAuthMode()" id="authToggle" style="color:#8cc9ff;">Регистрация</a>
            </p>
        </div>
    </div>

    <!-- Модальное окно добавления билда -->
    <div id="buildModal" class="modal">
        <div class="modal-content" style="max-width:600px;">
            <h2>➕ Новый билд</h2>
            <div class="form-group" style="margin-bottom:15px;">
                <label style="display:block; margin-bottom:5px; color:#ccc;">Название билда</label>
                <input type="text" id="buildTitle" placeholder="Например: Дрифт">
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label style="display:block; margin-bottom:5px; color:#ccc;">Детали</label>
                <textarea id="buildDetails" rows="6" placeholder="Двигатель, турбо, настройки..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-primary" onclick="saveBuild()">Сохранить</button>
                <button class="btn-secondary" onclick="closeBuildModal()">Отмена</button>
            </div>
        </div>
    </div>

    <div class="wrapper">
        <!-- Шапка -->
        <div class="top-bar">
            <div class="logo">worldFRAME</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Билды</a>
                <a href="vinyls.html" class="nav-link">Винилы</a>
            </div>
            <div class="user-bar" id="userBar">
                <a onclick="App.openAuthModal('login')">Войти</a> | <a onclick="App.openAuthModal('register')">Регистрация</a>
            </div>
        </div>

        <!-- Информация о машине -->
        <div class="car-header">
            <h1 id="carName"></h1>
            <div class="car-class" id="carClass"></div>
        </div>

        <!-- Заголовок и кнопка добавления -->
        <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: #1a1a1a; padding: 20px 30px; border-radius: 60px; border: 1px solid #333;">
            <h2 style="font-size:2rem; font-weight:600; color:#8cc9ff;">⚙️ Билды</h2>
            <button class="add-btn" onclick="openBuildModal()" style="background:#2a6f8a; color:#fff; border:none; padding:12px 30px; border-radius:40px; font-size:1.1rem; font-weight:600; cursor:pointer; border:1px solid #4ab0ff;">+ Добавить билд</button>
        </div>

        <!-- Поиск и сортировка -->
        <div class="search-sort" style="display: flex; gap: 15px; margin-bottom: 25px; background: #1a1a1a; padding: 15px 25px; border-radius: 60px; border: 1px solid #333; align-items: center;">
            <input type="text" id="searchBuilds" placeholder="🔍 Поиск по названию..." style="flex:1; background:#2a2a2a; border:1px solid #444; color:#fff; padding:12px 20px; border-radius:40px; font-size:1rem;">
            <select id="sortBuilds" style="background:#2a2a2a; border:1px solid #444; color:#fff; padding:12px 20px; border-radius:40px; font-size:1rem; cursor:pointer;">
                <option value="date">По дате (новые)</option>
                <option value="likes">По популярности (лайки)</option>
            </select>
        </div>

        <!-- Сетка билдов -->
        <div class="builds-grid" id="buildsGrid"></div>

        <footer style="text-align: center; color: #666; margin-top: 60px; font-size: 0.9rem;">
            <p>© worldFrame 2025 · Билды и винилы для NFS World</p>
        </footer>
    </div>

    <!-- Задаём адрес бэкенда -->
    <script>
        window.__API_URL = 'https://worldframe-backend.onrender.com/api';
        console.log('🌐 API URL задан:', window.__API_URL);
    </script>

    <!-- Подключаем скрипты -->
    <script src="cars.js"></script>
    <script src="api.js"></script>
    <script src="admin.js"></script>

    <!-- Скрипт для билдов -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const carName = urlParams.get('car');
        const carClass = urlParams.get('class');

        document.getElementById('carName').textContent = carName || 'Неизвестная машина';
        document.getElementById('carClass').textContent = (carClass || '?') + '-класс';

        let builds = [];

        async function loadBuilds() {
            try {
                builds = await window.api.getBuilds(carName);
                renderBuilds();
            } catch (error) {
                console.error('Ошибка загрузки билдов:', error);
            }
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }

        const searchInput = document.getElementById('searchBuilds');
        const sortSelect = document.getElementById('sortBuilds');
        const grid = document.getElementById('buildsGrid');

        function renderBuilds() {
            let filtered = builds.filter(b => b.title.toLowerCase().includes(searchInput.value.toLowerCase()));

            if (sortSelect.value === 'likes') {
                filtered.sort((a, b) => (b.likes.length - b.dislikes.length) - (a.likes.length - a.dislikes.length));
            } else {
                filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-builds">🚫 Нет билдов</div>';
                return;
            }

            grid.innerHTML = filtered.map(b => {
                const user = App.getCurrentUser();
                const userLiked = user && b.likes.includes(user.id);
                const userDisliked = user && b.dislikes.includes(user.id);
                return `
                    <div class="build-card" data-id="${b._id}">
                        <div class="build-title">${escapeHtml(b.title)}</div>
                        <div class="build-author">by ${escapeHtml(b.author)}</div>
                        <div class="build-details">${escapeHtml(b.details).replace(/\n/g, '<br>')}</div>
                        <div class="build-stats">
                            <span class="likes" onclick="likeBuild('${b._id}')" style="${userLiked ? 'font-weight:bold;' : ''}">👍 ${b.likes.length}</span>
                            <span class="dislikes" onclick="dislikeBuild('${b._id}')" style="${userDisliked ? 'font-weight:bold;' : ''}">👎 ${b.dislikes.length}</span>
                            ${App.isAdmin() ? `<span class="delete-btn" onclick="deleteBuild('${b._id}')">🗑️</span>` : ''}
                        </div>
                        <div class="build-date">📅 ${formatDate(b.createdAt)}</div>
                        <div class="comments-section">
                            ${b.comments.map((c, index) => `
                                <div class="comment">
                                    <div class="comment-author">${escapeHtml(c.author)}</div>
                                    <div class="comment-text">${escapeHtml(c.text)}</div>
                                    ${App.isAdmin() ? `<span class="delete-comment" onclick="deleteBuildComment('${b._id}', '${c._id}')">🗑️</span>` : ''}
                                </div>
                            `).join('')}
                            <div class="add-comment">
                                <input type="text" id="comment-${b._id}" placeholder="Ваш комментарий...">
                                <button onclick="addBuildComment('${b._id}')">Отправить</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.likeBuild = async (id) => {
            try {
                const result = await window.api.likeBuild(id, 'like');
                const build = builds.find(b => b._id === id);
                if (build) {
                    build.likes = result.likes;
                    build.dislikes = result.dislikes;
                }
                renderBuilds();
            } catch (error) {
                alert(error.message);
            }
        };

        window.dislikeBuild = async (id) => {
            try {
                const result = await window.api.likeBuild(id, 'dislike');
                const build = builds.find(b => b._id === id);
                if (build) {
                    build.likes = result.likes;
                    build.dislikes = result.dislikes;
                }
                renderBuilds();
            } catch (error) {
                alert(error.message);
            }
        };

        window.addBuildComment = async (id) => {
            const input = document.getElementById(`comment-${id}`);
            const text = input.value.trim();
            if (!text) return;
            try {
                const newComment = await window.api.addBuildComment(id, text);
                const build = builds.find(b => b._id === id);
                if (build) {
                    build.comments.push(newComment);
                }
                renderBuilds();
                input.value = '';
            } catch (error) {
                alert(error.message);
            }
        };

        window.deleteBuild = async (id) => {
            if (!confirm('Удалить билд?')) return;
            try {
                await window.api.deleteBuild(id);
                builds = builds.filter(b => b._id !== id);
                renderBuilds();
            } catch (error) {
                alert(error.message);
            }
        };

        window.deleteBuildComment = async (buildId, commentId) => {
            if (!confirm('Удалить комментарий?')) return;
            try {
                await window.api.deleteBuildComment(buildId, commentId);
                const build = builds.find(b => b._id === buildId);
                if (build) {
                    build.comments = build.comments.filter(c => c._id !== commentId);
                }
                renderBuilds();
            } catch (error) {
                alert(error.message);
            }
        };

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe.replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        searchInput.addEventListener('input', renderBuilds);
        sortSelect.addEventListener('change', renderBuilds);

        // Модалка добавления билда
        const buildModal = document.getElementById('buildModal');
        const buildTitle = document.getElementById('buildTitle');
        const buildDetails = document.getElementById('buildDetails');

        window.openBuildModal = () => buildModal.classList.add('active');
        window.closeBuildModal = () => buildModal.classList.remove('active');

        window.saveBuild = async () => {
            const title = buildTitle.value.trim();
            const details = buildDetails.value.trim();
            if (!title || !details) {
                alert('Заполните название и детали');
                return;
            }
            try {
                const newBuild = await window.api.createBuild(carName, title, details);
                builds.unshift(newBuild);
                renderBuilds();
                closeBuildModal();
            } catch (error) {
                alert(error.message);
            }
        };

        window.onclick = function(event) {
            if (event.target === authModal) App.closeAuthModal();
            if (event.target === buildModal) closeBuildModal();
        };

        loadBuilds();
    </script>
</body>
</html>
